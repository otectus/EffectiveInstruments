name: Dependency Submission

# Runs on every push to main. Populates the repository's dependency graph
# in GitHub Insights so Dependabot and security advisories can flag issues
# across the ForgeGradle + Curse Maven transitive chain.
#
# Only runs on push events (not PRs) because dependency submission requires
# write access to the dependency graph, which PRs from forks cannot grant.
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v4
