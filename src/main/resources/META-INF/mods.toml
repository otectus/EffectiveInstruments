modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="genshinstrument"
    mandatory=false
    versionRange="[5.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="evenmoreinstruments"
    mandatory=false
    versionRange="[6.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="immersive_melodies"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# 1.6.0 Phase 2-5 — NPC compat target mods. All optional; the adapter package
# at compat/<modid>/ is the only place that touches the mod's runtime classes,
# and it self-gates via ModList.get().isLoaded(<modid>). versionRange is "[0,)"
# for every entry because most of these mods report their version with the MC
# prefix (e.g. "1.20.1-3.15.6") which Forge's Maven comparator mis-orders
# against a plain numeric bound like "[3.4,)". Real version validation happens
# at runtime via ModList + reflection-cached MethodHandle resolution.
[[dependencies.${mod_id}]]
    modId="recruits"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
